# TimescaleDB for candle storage and research results.
# Start with: docker compose up -d
# Migrations run automatically on first CLI use.
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rara
      POSTGRES_PASSWORD: rara
      POSTGRES_DB: rara_trading
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rara -d rara_trading"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  tsdb_data:
