[package]
name = "rara-trading"
version = "0.1.0"
edition = "2024"
description = "TODO: describe your CLI"
license = "MIT"
repository = "https://github.com/rararulab/rara-trading"

[dependencies]
async-trait = "0.1"
barter = "0.12"
barter-instrument = "0.3"
bon = "3"
ccxt-rust = { version = "0.1", features = ["rest"] }
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
config = "0.15"
dirs = "6"
futures = "0.3"
jiff = { version = "0.2", features = ["serde"] }
nix = { version = "0.30", features = ["signal"] }
reqwest = { version = "0.13", features = ["json", "stream"] }
rust_decimal = { version = "1", features = ["serde-str"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sled = "0.34"
smol_str = "0.3"
snafu = "0.9"
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "process", "io-util", "time", "sync"] }
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"
rust_decimal_macros = "1"

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
redundant_pub_crate = "allow"
